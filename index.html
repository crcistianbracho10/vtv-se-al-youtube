<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTV Canal 8 - En Vivo Directo</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0c10;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            box-sizing: border-box;
        }
        .player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #e50914;
        }
        .status-info {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #66fcf1;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="player-container" id="player-wrapper">
            <div id="loader" class="loading">Sincronizando señal en vivo...</div>
        </div>
        <div class="status-info" id="status">Buscando transmisión activa de VTV...</div>
    </div>

    <script>
        const wrapper = document.getElementById('player-wrapper');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status');
        
        let activeVideoId = null;

        async function fetchLiveId() {
            // Usamos un proxy CORS público y gratuito para leer la web de youtube directamente desde el navegador
            const targetUrl = 'https://www.youtube.com/@VTV-canal8/live';
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl);

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Error en el Proxy');
                
                const data = await response.json();
                const html = data.contents;

                // Buscamos el ID del video usando un regex muy amplio
                let videoId = null;
                
                // Intento 1: Buscar url canónica
                const canonicalMatch = html.match(/<link rel="canonical" href="https:\/\/www\.youtube\.com\/watch\?v=([^"]+)"/);
                if (canonicalMatch && canonicalMatch[1]) {
                    videoId = canonicalMatch[1];
                } else {
                    // Intento 2: Buscar en la configuración interna de reproducción
                    const videoIdMatch = html.match(/"videoId":"([^"]{11})"/);
                    if (videoIdMatch && videoIdMatch[1]) {
                        videoId = videoIdMatch[1];
                    }
                }

                return videoId;
            } catch (error) {
                console.error("Error obteniendo el ID:", error);
                return null;
            }
        }

        async function updateLivePlayer() {
            statusText.innerText = "Verificando estado del canal...";
            const videoId = await fetchLiveId();

            if (videoId && videoId.length === 11) {
                // Si encontramos un ID válido y es diferente al actual
                if (videoId !== activeVideoId) {
                    activeVideoId = videoId;
                    
                    // Limpiamos reproductor anterior
                    const oldIframe = document.getElementById('vtv-iframe');
                    if (oldIframe) oldIframe.remove();

                    // Insertamos el nuevo iframe con el ID real descubierto
                    const iframe = document.createElement('iframe');
                    iframe.id = 'vtv-iframe';
                    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0`;
                    iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                    iframe.setAttribute('allowfullscreen', 'true');
                    
                    wrapper.appendChild(iframe);
                    loader.style.display = 'none';
                    statusText.innerText = `Conectado al directo activo (ID: ${activeVideoId})`;
                    console.log("Señal actualizada:", activeVideoId);
                } else {
                    statusText.innerText = "La señal sigue activa sin cambios.";
                }
            } else {
                statusText.innerText = "VTV no parece estar transmitiendo o YouTube bloqueó la consulta. Reintentando...";
            }
        }

        // Ejecución inicial
        updateLivePlayer();

        // Re-verificar cada 2 minutos si el directo cambió o se reinició
        setInterval(updateLivePlayer, 120000);
    </script>
</body>
</html>
