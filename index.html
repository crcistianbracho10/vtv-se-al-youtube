<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTV Canal 8 - En Vivo</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 960px;
            text-align: center;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .status-bar {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-wrapper">
            <div id="loader" class="loading">Buscando señal en vivo...</div>
            <iframe id="player" style="display: none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="status-bar" id="status">Iniciando sistema...</div>
    </div>

    <script>
        const player = document.getElementById('player');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status');

        let currentVideoId = null;

        async function checkLiveStream() {
            try {
                statusText.innerText = "Verificando transmisión...";
                // Llama al endpoint de Vercel que acabamos de crear
                const res = await fetch('/api/get-live');
                const data = await res.json();

                if (data.live && data.videoId) {
                    // Si el ID del video cambió o es la primera carga:
                    if (data.videoId !== currentVideoId) {
                        currentVideoId = data.videoId;
                        player.src = data.embedUrl;
                        player.style.display = "block";
                        loader.style.display = "none";
                        statusText.innerText = "Transmitiendo en vivo • Autorefresco activo";
                        console.log("Nueva transmisión detectada e iniciada:", data.videoId);
                    }
                } else {
                    player.style.display = "none";
                    loader.style.display = "block";
                    loader.innerText = "Canal fuera del aire";
                    statusText.innerText = "No hay directos activos en este momento.";
                }
            } catch (err) {
                console.error("Error al buscar señal:", err);
                statusText.innerText = "Error de conexión. Reintentando...";
            }
        }

        // Ejecutar en la carga inicial
        checkLiveStream();

        // Verificar si cambió el directo cada 5 minutos de forma silenciosa
        setInterval(checkLiveStream, 5 * 60 * 1000);
    </script>
</body>
</html>
