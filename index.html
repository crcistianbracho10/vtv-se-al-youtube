<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTV - Canal 8 en Vivo</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0c10;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            box-sizing: border-box;
        }
        .player-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #e50914;
            display: block;
        }
        .status-info {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #66fcf1;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="player-container" id="player-wrapper">
            <div id="loader" class="loading">Sincronizando señal de VTV...</div>
            </div>
        <div class="status-info" id="status">Iniciando...</div>
    </div>

    <script>
        const wrapper = document.getElementById('player-wrapper');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status');
        
        let activeVideoId = null;

        async function updateLivePlayer() {
            try {
                // Hacemos la consulta a nuestra función serverless de Vercel
                const response = await fetch('/api/get-live');
                const data = await response.json();

                if (data.live && data.videoId) {
                    // Solo si el ID del stream ha cambiado (o es la primera carga)
                    if (data.videoId !== activeVideoId) {
                        activeVideoId = data.videoId;
                        
                        // Eliminamos un iframe anterior si existe
                        const oldIframe = document.getElementById('vtv-iframe');
                        if (oldIframe) oldIframe.remove();

                        // Creamos el nuevo iframe limpio
                        const iframe = document.createElement('iframe');
                        iframe.id = 'vtv-iframe';
                        iframe.src = data.embedUrl;
                        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                        iframe.setAttribute('allowfullscreen', 'true');
                        
                        wrapper.appendChild(iframe);
                        loader.style.display = 'none';
                        statusText.innerText = `Señal en Vivo Activa (ID: ${activeVideoId})`;
                        console.log("Transmisión actualizada con éxito al ID:", activeVideoId);
                    }
                } else {
                    statusText.innerText = "Transmisión no detectada. Reintentando...";
                    loader.innerText = "Canal temporalmente fuera del aire";
                    loader.style.display = 'block';
                }
            } catch (err) {
                console.error("Error al conectar con la API:", err);
                statusText.innerText = "Error al intentar sincronizar la señal.";
            }
        }

        // Ejecutar inmediatamente al abrir la página
        updateLivePlayer();

        // Monitorear cambios cada 3 minutos (180000 ms) en segundo plano
        setInterval(updateLivePlayer, 180000);
    </script>
</body>
</html>
